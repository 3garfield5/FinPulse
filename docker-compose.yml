name: finpulse

services:
  s3:
    image: minio/minio:latest
    container_name: finpulse-minio
    command: server /data --console-address ":9001"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - finpulse

  s3-init:
    image: minio/mc:latest
    container_name: finpulse-minio-init
    depends_on:
      s3:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://s3:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY;
      mc mb -p local/$$S3_BUCKET || true;
      mc anonymous set none local/$$S3_BUCKET || true;
      echo 'MinIO bucket ensured';
      "
    restart: "no"
    networks:
      - finpulse

  ollama:
    image: ollama/ollama:latest
    container_name: finpulse-ollama
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_THREADS: "6"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - finpulse

  db:
    image: postgres:16-alpine
    container_name: finpulse-db
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      - finpulse

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finpulse-backend
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_MAX_CONCURRENCY: ${OLLAMA_MAX_CONCURRENCY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_EXPIRE_MINUTES: ${ACCESS_EXPIRE_MINUTES}
      REFRESH_EXPIRE_DAYS: ${REFRESH_EXPIRE_DAYS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PRESIGN_EXPIRES_SEC: ${S3_PRESIGN_EXPIRES_SEC}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      s3:
        condition: service_healthy
      s3-init:
        condition: service_completed_successfully
    entrypoint: ["/app/entrypoint.sh"]
    command: ["python", "-m", "uvicorn", "app.presentation.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    networks:
      - finpulse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: finpulse-frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - finpulse

volumes:
  ollama:
  pgdata:
  minio_data:

networks:
  finpulse:
    driver: bridge
